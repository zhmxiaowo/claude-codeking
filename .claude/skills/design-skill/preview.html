<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESIGN.md Gallery - 68 Brand Design Systems</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0e0e10;--card:#1a1a1e;--card-hover:#24242a;--border:#2a2a30;--text:#e4e4e7;--text2:#a1a1aa;--accent:#7c5cfc;--accent2:#a78bfa;--green:#22c55e;--radius:10px}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* Header */
  .header{position:sticky;top:0;z-index:100;background:rgba(14,14,16,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .header h1{font-size:18px;font-weight:600;white-space:nowrap}
  .header h1 span{color:var(--accent2);font-weight:400;font-size:14px;margin-left:6px}
  .search{flex:1;min-width:200px;max-width:400px;position:relative}
  .search input{width:100%;padding:8px 12px 8px 34px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
  .theme-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .theme-toggle button{padding:6px 14px;font-size:13px;background:transparent;color:var(--text2);border:none;cursor:pointer;transition:all .2s}
  .theme-toggle button.active{background:var(--accent);color:#fff}
  .count{font-size:13px;color:var(--text2);white-space:nowrap}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:16px 24px 24px}

  /* Card */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;overflow:hidden;position:relative}
  .card:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-2px)}
  .card.selected{border-color:var(--green);box-shadow:0 0 0 1px var(--green)}
  .card-body{padding:14px 16px}
  .card-num{font-size:11px;font-weight:700;color:var(--accent2);font-variant-numeric:tabular-nums;margin-bottom:2px}
  .card-brand{font-size:16px;font-weight:600;margin-bottom:4px;text-transform:capitalize}
  .card-desc{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  /* Preview panel */
  .preview-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}
  .preview-overlay.open{display:flex}
  .preview-panel{position:fixed;top:0;right:0;bottom:0;width:min(85vw,1200px);z-index:201;background:var(--bg);border-left:1px solid var(--border);display:none;flex-direction:column}
  .preview-panel.open{display:flex}
  .preview-header{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
  .preview-header h2{font-size:18px;font-weight:600;flex:1;text-transform:capitalize}
  .preview-header .num-badge{background:var(--accent);color:#fff;padding:2px 10px;border-radius:20px;font-size:13px;font-weight:600}
  .preview-header .close-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:18px;transition:all .2s}
  .preview-header .close-btn:hover{background:#ef4444;border-color:#ef4444;color:#fff}
  .preview-nav{display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
  .preview-nav .ptheme{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .preview-nav .ptheme button{padding:5px 12px;font-size:12px;background:transparent;color:var(--text2);border:none;cursor:pointer;transition:all .15s}
  .preview-nav .ptheme button.active{background:var(--accent);color:#fff}
  .preview-nav .use-btn{margin-left:auto;padding:6px 16px;background:var(--green);color:#000;font-weight:600;font-size:13px;border:none;border-radius:6px;cursor:pointer;transition:opacity .2s}
  .preview-nav .use-btn:hover{opacity:.85}
  .preview-nav .nav-arrow{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:14px;transition:all .15s}
  .preview-nav .nav-arrow:hover{border-color:var(--accent)}
  .preview-iframe-wrap{flex:1;overflow:hidden}
  .preview-iframe-wrap iframe{width:100%;height:100%;border:none}

  /* Selected toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 24px;border-radius:10px;font-weight:600;font-size:14px;z-index:300;display:none;box-shadow:0 8px 32px rgba(34,197,94,.3)}
  .toast.show{display:block;animation:pop .35s ease}
  @keyframes pop{0%{transform:translateX(-50%) scale(.8);opacity:0}100%{transform:translateX(-50%) scale(1);opacity:1}}

  /* Responsive */
  @media(max-width:640px){
    .grid{grid-template-columns:1fr 1fr;gap:8px;padding:12px}
    .header{padding:10px 12px}
    .preview-panel{width:100vw}
  }
</style>
</head>
<body>

<div class="header">
  <h1>DESIGN.md Gallery <span>68 Styles</span></h1>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="Search brand name...">
  </div>
  <div class="theme-toggle">
    <button class="active" data-theme="light">Light</button>
    <button data-theme="dark">Dark</button>
  </div>
  <div class="count" id="countLabel">68 / 68</div>
</div>

<div class="grid" id="grid"></div>

<div class="preview-overlay" id="overlay"></div>
<div class="preview-panel" id="panel">
  <div class="preview-header">
    <span class="num-badge" id="panelNum">#1</span>
    <h2 id="panelBrand">brand</h2>
    <button class="close-btn" id="closeBtn">&times;</button>
  </div>
  <div class="preview-nav">
    <button class="nav-arrow" id="prevBtn" title="Previous">&larr;</button>
    <button class="nav-arrow" id="nextBtn" title="Next">&rarr;</button>
    <div class="ptheme">
      <button class="active" data-pt="light">Light</button>
      <button data-pt="dark">Dark</button>
    </div>
    <button class="use-btn" id="useBtn">Copy brand name</button>
  </div>
  <div class="preview-iframe-wrap">
    <iframe id="previewFrame" sandbox="allow-same-origin"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BRANDS = [
  {id:1,brand:"airbnb",desc:"Travel marketplace. Warm coral accent, photography-driven, rounded UI."},
  {id:2,brand:"airtable",desc:"Spreadsheet-database hybrid. Colorful, friendly, structured data aesthetic."},
  {id:3,brand:"apple",desc:"Consumer electronics. Premium white space, SF Pro, cinematic imagery."},
  {id:4,brand:"binance",desc:"Crypto exchange. Bold yellow accent on monochrome, trading-floor urgency."},
  {id:5,brand:"bmw",desc:"Luxury automotive. Dark premium surfaces, precise German engineering aesthetic."},
  {id:6,brand:"bugatti",desc:"Hypercar brand. Cinema-black canvas, monochrome austerity, monumental display type."},
  {id:7,brand:"cal",desc:"Open-source scheduling. Clean neutral UI, developer-oriented simplicity."},
  {id:8,brand:"claude",desc:"Anthropic's AI assistant. Warm terracotta accent, clean editorial layout."},
  {id:9,brand:"clay",desc:"Creative agency. Organic shapes, soft gradients, art-directed layout."},
  {id:10,brand:"clickhouse",desc:"Fast analytics database. Yellow-accented, technical documentation style."},
  {id:11,brand:"cohere",desc:"Enterprise AI platform. Vibrant gradients, data-rich dashboard aesthetic."},
  {id:12,brand:"coinbase",desc:"Crypto exchange. Clean blue identity, trust-focused, institutional feel."},
  {id:13,brand:"composio",desc:"Tool integration platform. Modern dark with colorful integration icons."},
  {id:14,brand:"cursor",desc:"AI-first code editor. Sleek dark interface, gradient accents."},
  {id:15,brand:"elevenlabs",desc:"AI voice platform. Dark cinematic UI, audio-waveform aesthetics."},
  {id:16,brand:"expo",desc:"React Native platform. Dark theme, tight letter-spacing, code-centric."},
  {id:17,brand:"ferrari",desc:"Luxury automotive. Chiaroscuro editorial, Ferrari Red accents, cinematic black."},
  {id:18,brand:"figma",desc:"Collaborative design tool. Vibrant multi-color, playful yet professional."},
  {id:19,brand:"framer",desc:"Website builder. Bold black and blue, motion-first, design-forward."},
  {id:20,brand:"hashicorp",desc:"Infrastructure automation. Enterprise-clean, black and white."},
  {id:21,brand:"ibm",desc:"Enterprise technology. Carbon design system, structured blue palette."},
  {id:22,brand:"intercom",desc:"Customer messaging. Friendly blue palette, conversational UI patterns."},
  {id:23,brand:"kraken",desc:"Crypto trading. Purple-accented dark UI, data-dense dashboards."},
  {id:24,brand:"lamborghini",desc:"Supercar brand. True black surfaces, gold accents, dramatic uppercase typography."},
  {id:25,brand:"linear.app",desc:"Project management. Ultra-minimal, precise, purple accent."},
  {id:26,brand:"lovable",desc:"AI full-stack builder. Playful gradients, friendly dev aesthetic."},
  {id:27,brand:"mastercard",desc:"Global payments network. Warm cream canvas, orbital pill shapes, editorial warmth."},
  {id:28,brand:"meta",desc:"Tech retail store. Photography-first, binary light/dark surfaces, Meta Blue CTAs."},
  {id:29,brand:"minimax",desc:"AI model provider. Bold dark interface with neon accents."},
  {id:30,brand:"mintlify",desc:"Documentation platform. Clean, green-accented, reading-optimized."},
  {id:31,brand:"miro",desc:"Visual collaboration. Bright yellow accent, infinite canvas aesthetic."},
  {id:32,brand:"mistral.ai",desc:"Open-weight LLM provider. French-engineered minimalism, purple-toned."},
  {id:33,brand:"mongodb",desc:"Document database. Green leaf branding, developer documentation focus."},
  {id:34,brand:"nike",desc:"Athletic retail. Monochrome UI, massive uppercase type, full-bleed photography."},
  {id:35,brand:"notion",desc:"All-in-one workspace. Warm minimalism, serif headings, soft surfaces."},
  {id:36,brand:"nvidia",desc:"GPU computing. Green-black energy, technical power aesthetic."},
  {id:37,brand:"ollama",desc:"Run LLMs locally. Terminal-first, monochrome simplicity."},
  {id:38,brand:"opencode.ai",desc:"AI coding platform. Developer-centric dark theme."},
  {id:39,brand:"pinterest",desc:"Visual discovery. Red accent, masonry grid, image-first."},
  {id:40,brand:"playstation",desc:"Gaming console retail. Three-surface channel layout, cyan hover-scale."},
  {id:41,brand:"posthog",desc:"Product analytics. Playful hedgehog branding, developer-friendly dark UI."},
  {id:42,brand:"raycast",desc:"Productivity launcher. Sleek dark chrome, vibrant gradient accents."},
  {id:43,brand:"renault",desc:"French automotive. Vibrant aurora gradients, NouvelR typography, bold energy."},
  {id:44,brand:"replicate",desc:"Run ML models via API. Clean white canvas, code-forward."},
  {id:45,brand:"resend",desc:"Email API. Minimal dark theme, monospace accents."},
  {id:46,brand:"revolut",desc:"Digital banking. Sleek dark interface, gradient cards, fintech precision."},
  {id:47,brand:"runwayml",desc:"AI video generation. Cinematic dark UI, media-rich layout."},
  {id:48,brand:"sanity",desc:"Headless CMS. Red accent, content-first editorial layout."},
  {id:49,brand:"sentry",desc:"Error monitoring. Dark dashboard, data-dense, pink-purple accent."},
  {id:50,brand:"shopify",desc:"E-commerce platform. Dark-first cinematic, neon green accent, ultra-light type."},
  {id:51,brand:"spacex",desc:"Space technology. Stark black and white, full-bleed imagery, futuristic."},
  {id:52,brand:"spotify",desc:"Music streaming. Vibrant green on dark, bold type, album-art-driven."},
  {id:53,brand:"stripe",desc:"Payment infrastructure. Signature purple gradients, weight-300 elegance."},
  {id:54,brand:"supabase",desc:"Open-source Firebase alternative. Dark emerald theme, code-first."},
  {id:55,brand:"superhuman",desc:"Fast email client. Premium dark UI, keyboard-first, purple glow."},
  {id:56,brand:"tesla",desc:"Electric automotive. Radical subtraction, full-viewport photography, near-zero UI."},
  {id:57,brand:"theverge",desc:"Tech editorial media. Acid-mint and ultraviolet accents, Manuka display type."},
  {id:58,brand:"together.ai",desc:"Open-source AI infrastructure. Technical, blueprint-style design."},
  {id:59,brand:"uber",desc:"Mobility platform. Bold black and white, tight type, urban energy."},
  {id:60,brand:"vercel",desc:"Frontend deployment. Black and white precision, Geist font."},
  {id:61,brand:"vodafone",desc:"Global telecom brand. Monumental uppercase display, Vodafone Red chapter bands."},
  {id:62,brand:"voltagent",desc:"AI agent framework. Void-black canvas, emerald accent, terminal-native."},
  {id:63,brand:"warp",desc:"Modern terminal. Dark IDE-like interface, block-based command UI."},
  {id:64,brand:"webflow",desc:"Visual web builder. Blue-accented, polished marketing site aesthetic."},
  {id:65,brand:"wired",desc:"Tech magazine. Paper-white broadsheet density, custom serif display."},
  {id:66,brand:"wise",desc:"Money transfer. Bright green accent, friendly and clear."},
  {id:67,brand:"x.ai",desc:"xAI lab. Stark monochrome, futuristic minimalism."},
  {id:68,brand:"zapier",desc:"Automation platform. Warm orange, friendly illustration-driven."}
];

let currentTheme = "light";
let currentPreviewTheme = "light";
let currentBrandIdx = -1;
let filteredBrands = [...BRANDS];

const grid = document.getElementById("grid");
const searchInput = document.getElementById("searchInput");
const countLabel = document.getElementById("countLabel");
const overlay = document.getElementById("overlay");
const panel = document.getElementById("panel");
const panelNum = document.getElementById("panelNum");
const panelBrand = document.getElementById("panelBrand");
const previewFrame = document.getElementById("previewFrame");
const toast = document.getElementById("toast");

function renderGrid() {
  const q = searchInput.value.toLowerCase().trim();
  filteredBrands = q ? BRANDS.filter(b => b.brand.includes(q) || b.desc.toLowerCase().includes(q) || String(b.id) === q) : [...BRANDS];
  countLabel.textContent = filteredBrands.length + " / " + BRANDS.length;
  grid.innerHTML = filteredBrands.map(b => `
    <div class="card${currentBrandIdx===b.id?' selected':''}" data-id="${b.id}" onclick="openPreview(${b.id})">
      <div class="card-body">
        <div class="card-num">#${String(b.id).padStart(2,'0')}</div>
        <div class="card-brand">${b.brand}</div>
        <div class="card-desc">${b.desc}</div>
      </div>
    </div>
  `).join("");
}

function getPreviewSrc(brand, theme) {
  const file = theme === "dark" ? "preview-dark.html" : "preview.html";
  return "previews/" + brand + "/" + file;
}

function openPreview(id) {
  const b = BRANDS.find(x => x.id === id);
  if (!b) return;
  currentBrandIdx = id;
  panelNum.textContent = "#" + id;
  panelBrand.textContent = b.brand;
  previewFrame.src = getPreviewSrc(b.brand, currentPreviewTheme);
  overlay.classList.add("open");
  panel.classList.add("open");
  renderGrid();
}

function closePreview() {
  overlay.classList.remove("open");
  panel.classList.remove("open");
  previewFrame.src = "";
  currentBrandIdx = -1;
  renderGrid();
}

function navigate(dir) {
  const idx = filteredBrands.findIndex(b => b.id === currentBrandIdx);
  if (idx < 0) return;
  const next = idx + dir;
  if (next >= 0 && next < filteredBrands.length) openPreview(filteredBrands[next].id);
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

// Theme toggles (grid-level)
document.querySelectorAll(".theme-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".theme-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTheme = btn.dataset.theme;
    // Also sync preview theme
    currentPreviewTheme = currentTheme;
    document.querySelectorAll(".ptheme button").forEach(b => {
      b.classList.toggle("active", b.dataset.pt === currentPreviewTheme);
    });
    if (currentBrandIdx > 0) {
      const b = BRANDS.find(x => x.id === currentBrandIdx);
      if (b) previewFrame.src = getPreviewSrc(b.brand, currentPreviewTheme);
    }
  });
});

// Preview theme toggles
document.querySelectorAll(".ptheme button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".ptheme button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentPreviewTheme = btn.dataset.pt;
    if (currentBrandIdx > 0) {
      const b = BRANDS.find(x => x.id === currentBrandIdx);
      if (b) previewFrame.src = getPreviewSrc(b.brand, currentPreviewTheme);
    }
  });
});

document.getElementById("closeBtn").addEventListener("click", closePreview);
overlay.addEventListener("click", closePreview);
document.getElementById("prevBtn").addEventListener("click", () => navigate(-1));
document.getElementById("nextBtn").addEventListener("click", () => navigate(1));
document.getElementById("useBtn").addEventListener("click", () => {
  const b = BRANDS.find(x => x.id === currentBrandIdx);
  if (b) {
    navigator.clipboard.writeText(b.brand).then(() => showToast("Copied: " + b.brand));
  }
});

searchInput.addEventListener("input", renderGrid);

document.addEventListener("keydown", e => {
  if (panel.classList.contains("open")) {
    if (e.key === "Escape") closePreview();
    else if (e.key === "ArrowLeft") navigate(-1);
    else if (e.key === "ArrowRight") navigate(1);
  }
});

renderGrid();
</script>
</body>
</html>
